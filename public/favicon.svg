<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Green chat bubble (large, left) -->
  <ellipse cx="82" cy="72" rx="58" ry="50" fill="#22c55e"/>
  <!-- Tail for green bubble -->
  <polygon points="48,112 30,138 72,112" fill="#22c55e"/>

  <!-- Blue/Purple chat bubble (smaller, right overlapping) -->
  <ellipse cx="122" cy="98" rx="52" ry="44" fill="#3b35e0"/>
  <!-- Tail for blue bubble -->
  <polygon points="100,132 130,155 148,132" fill="#3b35e0"/>

  <!-- Teal overlap highlight -->
  <ellipse cx="100" cy="88" rx="22" ry="20" fill="#14b8a6" opacity="0.45"/>

  <!-- Dots on green bubble -->
  <circle cx="65" cy="70" r="6" fill="white"/>
  <circle cx="82" cy="70" r="6" fill="white"/>
  <circle cx="99" cy="70" r="6" fill="white"/>

  <!-- Dots on blue bubble -->
  <circle cx="105" cy="96" r="5" fill="white"/>
  <circle cx="120" cy="96" r="5" fill="white"/>
  <circle cx="135" cy="96" r="5" fill="white"/>

  <!-- Accent dots -->
  <circle cx="148" cy="58" r="6" fill="#7c3aed"/>
  <circle cx="42" cy="118" r="5" fill="#166534"/>
</svg>